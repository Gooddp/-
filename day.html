<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>每日日程表 | 当天日程</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js" charset="utf-8" defer></script>
  </head>
  <body data-page="day">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="返回月历">
        <span class="brand-mark">日</span>
        <span>每日日程表</span>
      </a>
      <div class="user-menu" data-user-menu hidden>
        <span data-user-email></span>
        <button class="button ghost small" type="button" data-sign-out>退出</button>
      </div>
    </header>

    <main class="page-shell day-page">
      <section class="notice setup-notice" data-config-notice hidden>
        <strong>需要配置 Supabase 后才能云端保存。</strong>
        <p data-config-reason></p>
        <p>在 <code>app.js</code> 顶部填入 <code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code>，并在 Supabase SQL Editor 运行 <code>supabase-schema.sql</code>。</p>
      </section>

      <section class="auth-card" data-auth-gate hidden>
        <div>
          <p class="eyebrow">Daily List</p>
          <h1>登录后查看当天日程</h1>
          <p class="muted">每个账号只会看到自己的日程。</p>
        </div>
        <form class="auth-form" data-auth-form>
          <label>
            <span>邮箱</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            <span>密码</span>
            <input type="password" name="password" autocomplete="current-password" minlength="6" required>
          </label>
          <div class="auth-actions">
            <button class="button primary" type="submit" data-auth-action="signin">登录</button>
            <button class="button secondary" type="button" data-auth-action="signup">注册</button>
          </div>
          <p class="form-message" data-auth-message aria-live="polite"></p>
        </form>
      </section>

      <section data-app-content>
        <div class="page-title-row">
          <div>
            <a class="text-link" href="./index.html">返回月历</a>
            <h1 data-day-title>当天日程</h1>
            <p class="muted" data-day-subtitle>查看、编辑和完成今天的安排。</p>
          </div>
          <a class="button primary" data-new-link href="./edit.html">新增</a>
        </div>

        <div class="summary-strip">
          <div>
            <span class="summary-number" data-total-count>0</span>
            <span>项日程</span>
          </div>
          <div>
            <span class="summary-number" data-done-count>0</span>
            <span>项已完成</span>
          </div>
          <p class="form-message" data-day-message aria-live="polite"></p>
        </div>

        <section class="schedule-list" data-schedule-list aria-label="当天日程列表"></section>
      </section>

      <a class="pet-float" data-reflection-link href="./reflection.html" aria-label="写每日感想">
        <img src="./pet-placeholder.svg" alt="宠物占位">
        <span>感想</span>
      </a>
    </main>
  </body>
</html>
